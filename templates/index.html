<!DOCTYPE html>
<html>
<head>
<title>Personal Finance Analyzer</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#4facfe,#00f2fe);
    margin:0;
    padding:0;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

h1{
    text-align:center;
    color:white;
}

.form-card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#4facfe;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0077ff;
}

.graphs{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

.graph-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.graph-container img{
    width:300px;
    border-radius:8px;
}

.suggestions{
    margin-top:20px;
    padding:15px;
    background:#f5f9ff;
    border-left:5px solid #4facfe;
    border-radius:6px;
    font-size:16px;
    line-height:1.6;
}

@media(max-width:700px){
    .graph-container{
        flex-direction:column;
        align-items:center;
    }
}

</style>
</head>

<body>

<div class="container">

<h1>💰 Personal Finance Analyzer</h1>

<div class="form-card">

<form method="POST">

<label>Monthly Income</label>
<input type="number" name="income" required>

<label>Rent Expense</label>
<input type="number" name="rent" required>

<label>Food Expense</label>
<input type="number" name="food" required>

<label>Travel Expense</label>
<input type="number" name="travel" required>

<label>Other Expenses</label>
<input type="number" name="other" required>

<button type="submit">Analyze Finances</button>

</form>

</div>

{% if show_graphs %}
<div class="graphs">

<h2 style="text-align:center">📊 Analysis Results</h2>

<div class="graph-container">

<img src="{{ url_for('static', filename='pie_chart.png') }}?t={{time}}">

<img src="{{ url_for('static', filename='savings_graph.png') }}?t={{time}}">

<img src="{{ url_for('static', filename='expense_bar.png') }}?t={{time}}">

</div>

{% if suggestions %}

<h2 style="text-align:center;margin-top:30px;">💡 Financial Suggestions</h2>

<div class="suggestions">
{{ suggestions }}
</div>

{% endif %}

</div>
{% endif %}

</div>

</body>
</html>
